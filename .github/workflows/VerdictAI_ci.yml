name: VerdictAI — Manual CI Gate

on:
  workflow_dispatch:
    inputs:
      suite:
        description: "Test suite to run (relative path)"
        required: true
        default: "tests/suites/hallucination.yaml"

jobs:
  eval:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create config.env
        run: |
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> config.env
          echo "GROQ_MODEL=${{ secrets.GROQ_MODEL }}" >> config.env

      - name: Run Sentinel Eval
        run: python -m runner.main --suite ${{ github.event.inputs.suite }}

      - name: Upload SQLite DB as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-db
          path: memory/sentinel.db
